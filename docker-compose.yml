version: "3.9"

services:
  # ── Frontend (Vite/React + Nginx) ────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ipam_frontend
    restart: unless-stopped
    ports:
      - "80:80"     # HTTP → HTTPS redirect
      - "443:443"   # HTTPS
    volumes:
      # PRODUCTION: Mount real SSL certs (e.g., Let's Encrypt) here.
      # The Dockerfile generates a self-signed fallback for development.
      #
      # Let's Encrypt example (certbot):
      #   certbot certonly --standalone -d ipam.example.com
      #   cp /etc/letsencrypt/live/ipam.example.com/fullchain.pem ./certs/cert.pem
      #   cp /etc/letsencrypt/live/ipam.example.com/privkey.pem  ./certs/key.pem
      - ./certs:/etc/nginx/ssl:ro
    depends_on:
      - backend
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 256M

  # ── Backend (FastAPI) ────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ipam_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      - DATABASE_URL=postgresql://ipam_admin:ipam_internal_secure_db_pass@db:5432/ipam
      - REDIS_URL=redis://:ipam_internal_secure_redis_pass@redis:6379/0
    volumes:
      - backend_data:/app/data
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 512M

  # ── Celery Worker ────────────────────────────────────────────
  # Instead of network_mode: "host" + root, we grant only the
  # Linux capabilities Nmap needs for raw socket scans (SYN,
  # ICMP) and network interface inspection (MAC discovery).
  # This preserves Docker's network isolation and avoids giving
  # the worker full root access to the host network stack.
  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ipam_celery_worker
    restart: unless-stopped
    cap_add:
      - NET_RAW       # Raw sockets for SYN scans and ICMP ping
      - NET_ADMIN     # Network interface queries for MAC discovery
    command: ["bash", "-c", "source /app/data/app_secrets.env && celery -A app.core.celery_app worker --loglevel=info"]
    depends_on:
      backend:
        condition: service_healthy
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - backend_data:/app/data
    environment:
      - DATABASE_URL=postgresql://ipam_admin:ipam_internal_secure_db_pass@db:5432/ipam
      - REDIS_URL=redis://:ipam_internal_secure_redis_pass@redis:6379/0
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1G

  # ── Celery Beat (Scheduler) ──────────────────────────────────
  # Beat is the periodic task scheduler — it publishes tasks to
  # the broker on a configured schedule (e.g., hourly sweeps).
  # Workers execute them; Beat only schedules them.
  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ipam_celery_beat
    restart: unless-stopped
    command: ["bash", "-c", "source /app/data/app_secrets.env && celery -A app.core.celery_app beat --loglevel=info"]
    depends_on:
      backend:
        condition: service_healthy
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - backend_data:/app/data
    environment:
      - DATABASE_URL=postgresql://ipam_admin:ipam_internal_secure_db_pass@db:5432/ipam
      - REDIS_URL=redis://:ipam_internal_secure_redis_pass@redis:6379/0
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M

  # ── PostgreSQL 15 ────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: ipam_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ipam_admin
      POSTGRES_PASSWORD: ipam_internal_secure_db_pass
      POSTGRES_DB: ipam
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ipam_admin -d ipam"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1G

  # ── Redis (Celery Broker & Backend) ──────────────────────────
  redis:
    image: redis:alpine
    container_name: ipam_redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "ipam_internal_secure_redis_pass"]
    volumes:
      - redisdata:/data
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 256M

  # ── pgAdmin 4 ────────────────────────────────────────────────
  # WARNING: Exposes a full database management UI. Do NOT enable
  # in production unless locked behind a VPN or IP allowlist.
  # Uncomment the block below only for local development / debugging.
  #
  # pgadmin:
  #   image: dpage/pgadmin4:latest
  #   container_name: ipam_pgadmin
  #   restart: unless-stopped
  #   environment:
  #     PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
  #     PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
  #   ports:
  #     - "127.0.0.1:5050:80"
  #   depends_on:
  #     db:
  #       condition: service_healthy
  #   deploy:
  #     resources:
  #       limits:
  #         cpus: "0.5"
  #         memory: 256M

volumes:
  pgdata:
  redisdata:
  backend_data:

version: "3.9"

services:
  # ── Frontend (Vite/React + Nginx) ────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ipam_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

  # ── Backend (FastAPI) ────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ipam_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      - DATABASE_URL=postgresql://ipam:ipam_secret@db:5432/ipam
      - REDIS_URL=redis://redis:6379/0

  # ── Celery Worker ────────────────────────────────────────────
  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ipam_celery_worker
    restart: unless-stopped
    command: ["celery", "-A", "app.core.celery_app", "worker", "--loglevel=info"]
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      - DATABASE_URL=postgresql://ipam:ipam_secret@db:5432/ipam
      - REDIS_URL=redis://redis:6379/0

  # ── PostgreSQL 15 ────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: ipam_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ipam
      POSTGRES_PASSWORD: ipam_secret
      POSTGRES_DB: ipam
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ipam"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Redis (Celery Broker & Backend) ──────────────────────────
  redis:
    image: redis:alpine
    container_name: ipam_redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  # ── pgAdmin 4 (optional – for debugging / browsing data) ────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: ipam_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@ipam.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:

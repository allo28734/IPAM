version: "3.9"

services:
  # ── Frontend (Vite/React + Nginx) ────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ipam_frontend
    restart: unless-stopped
    ports:
      - "80:80"     # HTTP → HTTPS redirect
      - "443:443"   # HTTPS
    volumes:
      # PRODUCTION: Mount real SSL certs (e.g., Let's Encrypt) here.
      # The Dockerfile generates a self-signed fallback for development.
      #
      # Let's Encrypt example (certbot):
      #   certbot certonly --standalone -d ipam.example.com
      #   cp /etc/letsencrypt/live/ipam.example.com/fullchain.pem ./certs/cert.pem
      #   cp /etc/letsencrypt/live/ipam.example.com/privkey.pem  ./certs/key.pem
      - ./certs:/etc/nginx/ssl:ro
    depends_on:
      - backend
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 256M

  # ── Backend (FastAPI) ────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ipam_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      - DATABASE_URL=postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}
      - REDIS_URL=redis://redis:6379/0
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 512M

  # ── Celery Worker ────────────────────────────────────────────
  # network_mode: "host" gives the worker direct access to the
  # host's physical network interfaces, which is required for
  # accurate Nmap OS fingerprinting, MAC discovery, and raw
  # socket scans (SYN scans). Without this, Docker's NAT bridge
  # intercepts and mangles outbound scan traffic.
  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ipam_celery_worker
    restart: unless-stopped
    network_mode: "host"
    user: root   # Required for Nmap raw socket scans (SYN, OS fingerprint)
    command: ["celery", "-A", "app.core.celery_app", "worker", "--loglevel=info"]
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      # Host networking disables Docker DNS — use localhost since
      # db (5432) and redis (6379) publish ports to the host.
      - DATABASE_URL=postgresql://${DB_USER}:${DB_PASSWORD}@localhost:5432/${DB_NAME}
      - REDIS_URL=redis://localhost:6379/0
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1G

  # ── Celery Beat (Scheduler) ──────────────────────────────────
  # Beat is the periodic task scheduler — it publishes tasks to
  # the broker on a configured schedule (e.g., hourly sweeps).
  # Workers execute them; Beat only schedules them.
  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ipam_celery_beat
    restart: unless-stopped
    command: ["celery", "-A", "app.core.celery_app", "beat", "--loglevel=info"]
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      - DATABASE_URL=postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}
      - REDIS_URL=redis://redis:6379/0
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M

  # ── PostgreSQL 15 ────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: ipam_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1G

  # ── Redis (Celery Broker & Backend) ──────────────────────────
  redis:
    image: redis:alpine
    container_name: ipam_redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redisdata:/data
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 256M

  # ── pgAdmin 4 ────────────────────────────────────────────────
  # WARNING: Exposes a full database management UI. Do NOT enable
  # in production unless locked behind a VPN or IP allowlist.
  # Uncomment the block below only for local development / debugging.
  #
  # pgadmin:
  #   image: dpage/pgadmin4:latest
  #   container_name: ipam_pgadmin
  #   restart: unless-stopped
  #   environment:
  #     PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
  #     PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
  #   ports:
  #     - "127.0.0.1:5050:80"
  #   depends_on:
  #     db:
  #       condition: service_healthy
  #   deploy:
  #     resources:
  #       limits:
  #         cpus: "0.5"
  #         memory: 256M

volumes:
  pgdata:
  redisdata:

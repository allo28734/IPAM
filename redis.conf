# ─────────────────────────────────────────────────────────────────
# Redis configuration for IPAM
#
# This file is mounted read-only into the Redis container via
# docker-compose.yml. Non-sensitive settings go here; the password
# is passed via --requirepass CLI flag (env var substitution).
# ─────────────────────────────────────────────────────────────────

# Persist data to disk using the Append-Only File
appendonly yes

# Memory management
maxmemory-policy allkeys-lru
